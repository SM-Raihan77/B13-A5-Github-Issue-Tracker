<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker
    </title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- DaisyUI+Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">

    <div class="flex flex-col items-center justify-center h-screen space-y-6">

        <!-- Top Section: Logo & Text -->
        <div class="text-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-24 h-24 mb-4 mx-auto">
            <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
            <p class="text-gray-600">Sign in to manage your issues</p>
        </div>

        <!-- Bottom Section: Login Form -->
        <fieldset class="fieldset bg-base-100 border-base-300 rounded-box w-xs border p-6 shadow-sm">
            <legend class="fieldset-legend font-semibold text-center mx-auto">Sign In</legend>

            <label class="label">Username</label>
            <input type="text" class="input input-bordered w-full" placeholder="Username" />

            <label class="label mt-2">Password</label>
            <input type="password" class="input input-bordered w-full" placeholder="Password" />

            <button class="btn btn-primary mt-6 w-full text-white">Sign In</button>


            <!-- Demo Credentials Box -->
            <div class="bg-blue-50/50 p-4 rounded-lg text-center border border-blue-100 mt-2">
                <p class="text-xs text-gray-500 mb-2">Demo Credentials:</p>
                <div class="text-sm">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </fieldset>

    </div>
</body>


</html>
