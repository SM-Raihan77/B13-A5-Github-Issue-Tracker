<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Figma Active Tab Style */
        .active-tab { 
            background-color: #4F46E5 !important; 
            color: white !important; 
            border-color: #4F46E5 !important; 
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-10">

    <!-- Navbar -->
    <nav class="flex justify-between items-center py-4 px-10 bg-white border-b border-gray-100 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-gray-900 rounded-lg flex items-center justify-center">
                <img src="./" class="w-6 h-6 invert" alt="GH">
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">GitHub Issues</h1>
        </div>

        <div class="flex items-center gap-4">
            <div class="relative">
                <input 
                    id="searchInput"
                    type="search" 
                    placeholder="Search issues..." 
                    class="input input-bordered w-72 bg-gray-50 focus:bg-white"
                    oninput="handleSearch(this.value)"
                >
            </div>
            <button class="btn btn-primary bg-[#4F46E5] border-none text-white px-6">+ New Issue</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto mt-8">
        
        <!-- Tabs Section -->
        <div id="tabContainer" class="flex gap-4 px-6 mb-8">
            <button onclick="filterIssues('all', this)" class="tab-btn active-tab px-10 py-2 rounded-lg border border-gray-200 bg-white text-gray-500">All</button>

            <button onclick="filterIssues('open', this)" class="tab-btn px-10 py-2 rounded-lg border border-gray-200 bg-white text-gray-500 ">Open</button>

            <button onclick="filterIssues('closed', this)" class="tab-btn px-10 py-2 rounded-lg border border-gray-200 bg-white text-gray-500 ">Closed</button>
        </div>

        <!-- Status Info -->
        <div class="flex justify-between items-center px-6 mb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-purple-600">
                   
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-sm text-gray-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-6">
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-green-500"></span>
                    <span class="text-sm font-bold text-gray-700">Open</span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full bg-purple-500"></span>
                    <span class="text-sm font-bold text-gray-700">Closed</span>
                </div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loading" class="hidden flex justify-center py-20">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
        </div>
        
        <!-- Issue List Grid -->
        <div id="issueContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 px-6">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
